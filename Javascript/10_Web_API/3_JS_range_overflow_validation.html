<!-- 🧩 Example 4: rangeOverflow (Value Too Large)-->

<!DOCTYPE html>
<html>
<body>
  <h2>🔢 Range Overflow Example</h2>

  <input id="id1" type="number" max="100">
  <button onclick="checkValue()">Check</button>
  <p id="demo"></p>

  <script>
    function checkValue() {
      const input = document.getElementById("id1");
      let text = "✅ Value OK";
      if (input.validity.rangeOverflow) {
        text = "⚠️ Value too large (should be ≤ 100)";
      }
      document.getElementById("demo").innerHTML = text;
    }
  </script>
</body>
</html>
