<!-- for...of — Looping Through a String ✍️

Strings are also iterable — meaning we can go through each letter! -->

<!DOCTYPE html>
<html>
<body>
  <h2>🔠 for...of Loop with String</h2>
  <p id="demo3"></p>

  <script>
    let word = "hello";
    let output = "";

    for (let x of word) {
      output += x;
    }
    console.log(typeof(output))

    const fruits=['APPLE','BANANA','GRAPES'];
    for(let x of fruits){
      console.log(x);
    }

    document.getElementById("demo3").innerHTML = output;
  console.log(output)
  </script>
</body>
</html>
